name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Create ZIP
        run: zip -r site.zip dist

      - name: Deploy
        run: |
          curl \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            -F "file=@site.zip" \
            ${{ secrets.DEPLOY_URL }}
      
